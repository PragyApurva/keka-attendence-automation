name: Keka Punch-In

on:
  schedule:
    - cron: '0 4 * * 1-5'   # 09:30 IST (UTC+5:30) = 04:00 UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip holiday check'
        type: boolean
        default: false

jobs:
  punch-in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Punch in
        run: node scripts/run-action.js login
        env:
          KEKA_SUBDOMAIN: ${{ secrets.KEKA_SUBDOMAIN }}
          FORCE: ${{ inputs.force == true && '1' || '0' }}

      - name: Commit rotated token
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keka-refresh-token
          git diff --cached --quiet || git commit -m "chore: rotate keka refresh token"
          git push
