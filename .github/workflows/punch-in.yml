name: Keka Punch-In

on:
  schedule:
    - cron: '0 4 * * 1-5'   # 09:30 IST (UTC+5:30) = 04:00 UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip holiday check'
        type: boolean
        default: false

jobs:
  punch-in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore Chromium profile
        run: |
          mkdir -p "$HOME/.workctl"
          echo "$CHROMIUM_PROFILE_B64" | base64 -d | tar -xz -C "$HOME/.workctl"
        env:
          CHROMIUM_PROFILE_B64: ${{ secrets.CHROMIUM_PROFILE_B64 }}

      - name: Punch in
        run: node scripts/run-action.js login
        env:
          KEKA_SUBDOMAIN: ${{ secrets.KEKA_SUBDOMAIN }}
          FORCE: ${{ inputs.force == true && '1' || '0' }}
