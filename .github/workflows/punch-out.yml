name: Keka Punch-Out

on:
  schedule:
    - cron: '30 14 * * 1-5'  # 20:00 IST (UTC+5:30) = 14:30 UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip holiday check'
        type: boolean
        default: false

jobs:
  punch-out:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Inject session tokens
        run: node scripts/inject-session.js
        env:
          KEKA_SUBDOMAIN: ${{ secrets.KEKA_SUBDOMAIN }}
          KEKA_SESSION: ${{ secrets.KEKA_SESSION }}

      - name: Punch out
        run: node scripts/run-action.js logout
        env:
          KEKA_SUBDOMAIN: ${{ secrets.KEKA_SUBDOMAIN }}
          FORCE: ${{ inputs.force == true && '1' || '0' }}
