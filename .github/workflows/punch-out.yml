name: Keka Punch-Out

on:
  schedule:
    - cron: '30 14 * * 1-5'  # 20:00 IST (UTC+5:30) = 14:30 UTC, Mon–Fri
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip holiday check'
        type: boolean
        default: false

jobs:
  punch-out:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh Keka token
        id: refresh
        run: |
          TOKENS=$(node scripts/refresh-token.js)
          EXIT=$?
          if [ $EXIT -ne 0 ]; then exit $EXIT; fi
          ACCESS=$(echo "$TOKENS" | jq -r .access_token)
          REFRESH=$(echo "$TOKENS" | jq -r .refresh_token)
          echo "::add-mask::$ACCESS"
          echo "::add-mask::$REFRESH"
          echo "access_token=$ACCESS" >> "$GITHUB_OUTPUT"
          echo "refresh_token=$REFRESH" >> "$GITHUB_OUTPUT"
        env:
          KEKA_REFRESH_TOKEN: ${{ secrets.KEKA_REFRESH_TOKEN }}
          KEKA_SUBDOMAIN: ${{ secrets.KEKA_SUBDOMAIN }}

      - name: Punch out
        run: node scripts/run-action.js logout
        env:
          KEKA_ACCESS_TOKEN: ${{ steps.refresh.outputs.access_token }}
          KEKA_SUBDOMAIN: ${{ secrets.KEKA_SUBDOMAIN }}
          FORCE: ${{ inputs.force == true && '1' || '0' }}

      - name: Rotate refresh token secret
        if: always() && steps.refresh.outcome == 'success'
        run: gh secret set KEKA_REFRESH_TOKEN --body "$NEW_REFRESH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH: ${{ steps.refresh.outputs.refresh_token }}
